name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Fetch sources
        uses: actions/checkout@v4
        env:
          GIT_LFS_SKIP_SMUDGE: "1"
        with:
          submodules: recursive

      - name: Fetch bundled upstream ZIPs
        run: git -C vendor/egovframe-vscode-initializr lfs pull --include="templates/projects/examples/*.zip"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build and verify
        run: ./gradlew buildPlugin check verifyPluginProjectConfiguration verifyPluginStructure verifyPlugin

      - name: Sign plugin
        env:
          CERTIFICATE_CHAIN: ${{ secrets.CERTIFICATE_CHAIN }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          PRIVATE_KEY_PASSWORD: ${{ secrets.PRIVATE_KEY_PASSWORD }}
        run: ./gradlew signPlugin

      - name: Publish to Marketplace
        env:
          PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
        run: ./gradlew publishPlugin

      - name: Attach signed ZIP to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/distributions/*-marketplace-signed.zip
          generate_release_notes: true
