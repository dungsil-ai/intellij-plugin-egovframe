name: Build

on:
  push:
    branches: [ main ]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platformVersion: "2025.1.6"
            platformType: "IC"
          - platformVersion: "2026.1.4"
            platformType: "IU"
          - platformVersion: "2026.2"
            platformType: "IU"
    steps:
      - name: Fetch sources
        uses: actions/checkout@v4
        env:
          GIT_LFS_SKIP_SMUDGE: "1"
        with:
          submodules: recursive

      - name: Fetch bundled upstream ZIPs
        run: git -C vendor/egovframe-vscode-initializr lfs pull --include="templates/projects/examples/*.zip"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Test on IntelliJ IDEA ${{ matrix.platformVersion }}
        run: ./gradlew check -PplatformVersion=${{ matrix.platformVersion }} -PplatformType=${{ matrix.platformType }}

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch sources
        uses: actions/checkout@v4
        env:
          GIT_LFS_SKIP_SMUDGE: "1"
        with:
          submodules: recursive

      - name: Fetch bundled upstream ZIPs
        run: git -C vendor/egovframe-vscode-initializr lfs pull --include="templates/projects/examples/*.zip"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build and verify plugin
        run: ./gradlew buildPlugin verifyPluginProjectConfiguration verifyPluginStructure verifyPlugin

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-distribution
          path: build/distributions/*-marketplace.zip
